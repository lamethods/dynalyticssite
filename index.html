<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dynalytics — Analytics of dynamics and systems</title>
  <meta name="description" content="A framework for the rigorous analytics of dynamical systems — the packages, tutorials, papers, and book chapters of the Saqr & López-Pernas ecosystem behind the Dynalytics framework." />
  <meta name="theme-color" content="#ffffff" id="theme-color" />
  <!-- Dark mode is opt-in only: light by default, dark only if the user has
       explicitly chosen it (toggle saves to localStorage) or passes ?theme=dark.
       Set before first paint to avoid a flash. The OS setting is never consulted. -->
  <script>
    (function () {
      try {
        var q = (location.search.match(/[?&]theme=(dark|light)/) || [])[1];
        if (q) localStorage.setItem("dyna-theme", q);
        var saved = q || localStorage.getItem("dyna-theme");
        document.documentElement.setAttribute("data-theme", saved === "dark" ? "dark" : "light");
      } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
    })();
  </script>
  <!-- Editorial type: Fraunces (display) + Hanken Grotesk (body) + Space Mono (labels). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
